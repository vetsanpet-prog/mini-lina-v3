<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#ff8fc7"/>
<title>Lina Robot</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:#20263a}
body{background:linear-gradient(135deg,#fff9df,#e8f8ff,#fff0f7)}
.app{height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:12px 14px calc(env(safe-area-inset-bottom) + 14px)}
.stage{width:100%;max-width:520px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;min-height:0}
.badge{background:#ecfff3;color:#10864b;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:900;box-shadow:0 8px 22px #0001}
.title{font-weight:1000;font-size:28px;margin:10px 0 2px;text-align:center}
.subtitle{font-size:15px;color:#687083;font-weight:850;text-align:center;margin:2px 0 4px}
.robotWrap{height:345px;width:340px;position:relative;flex:0 0 auto}
.robot{position:absolute;left:50%;top:20px;transform:translateX(-50%);width:338px;height:350px;animation:float 3.2s ease-in-out infinite;filter:drop-shadow(0 24px 20px #60708625)}
@keyframes float{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-10px)}}
.hair{position:absolute;left:50%;top:-2px;transform:translateX(-50%);width:220px;height:86px;border-radius:70px 70px 20px 20px;background:linear-gradient(135deg,#7c5cff,#ff91c6);border:5px solid #262b3d;z-index:1}
.bow{position:absolute;left:50%;top:-35px;transform:translateX(-50%);font-size:54px;z-index:5}
.antenna{position:absolute;left:50%;top:-39px;width:7px;height:33px;border-radius:8px;background:#262b3d}
.light{position:absolute;left:50%;top:-61px;transform:translateX(-50%);width:28px;height:28px;background:#ffe45d;border:4px solid #262b3d;border-radius:50%;animation:lamp 1.4s infinite}
@keyframes lamp{50%{box-shadow:0 0 30px #ffdd44;transform:translateX(-50%) scale(1.12)}}
.ear{position:absolute;top:104px;width:51px;height:82px;border:5px solid #262b3d;background:linear-gradient(#ffd7ec,#ff99c9);border-radius:50px;z-index:1;animation:ear 2.6s infinite}
.ear.left{left:22px}.ear.right{right:22px;animation-delay:.55s}@keyframes ear{50%{transform:rotate(8deg) translateY(-2px)}}
.head{position:absolute;left:50%;top:22px;transform:translateX(-50%);width:235px;height:220px;border:5px solid #262b3d;border-radius:58px;background:linear-gradient(160deg,#effdff,#98e7ff 72%,#78d7ff);z-index:2}
.eye{position:absolute;top:92px;width:58px;height:61px;background:white;border-radius:50%;box-shadow:inset 0 5px 12px #0002}.eye.left{left:43px}.eye.right{right:43px}
.pupil{position:absolute;left:15px;top:16px;width:28px;height:28px;border-radius:50%;background:#23283a;animation:blink 4.2s infinite}.shine{position:absolute;left:6px;top:5px;width:8px;height:8px;background:#fff;border-radius:50%}
@keyframes blink{0%,43%,49%,100%{transform:scaleY(1)}46%{transform:scaleY(.06)}}
.cheek{position:absolute;top:154px;width:36px;height:18px;background:#ff8fc799;border-radius:50%}.cheek.left{left:27px}.cheek.right{right:27px}
.mouth{position:absolute;left:50%;top:158px;transform:translateX(-50%);width:56px;height:19px;border:5px solid #23283a;border-top:0;background:#ff72aa;border-radius:0 0 44px 44px}
.speaking .mouth{animation:talk .35s infinite}@keyframes talk{0%,100%{width:42px;height:12px}35%{width:84px;height:35px}70%{width:58px;height:23px}}
.body{position:absolute;left:50%;top:235px;transform:translateX(-50%);width:188px;height:112px;border:5px solid #262b3d;border-radius:40px;background:linear-gradient(150deg,#f5dbff,#ffc0e4);z-index:2}
.screen{position:absolute;left:50%;top:28px;transform:translateX(-50%);background:#fff;border:3px solid #262b3d;border-radius:18px;padding:9px 16px;font-weight:1000;color:#9c3cc0}
.arm{position:absolute;top:250px;width:42px;height:100px;border:5px solid #262b3d;background:linear-gradient(#b9f1ff,#77d8f7);border-radius:30px;transform-origin:top center;z-index:1}
.arm.left{left:43px;animation:wave 1.25s infinite}.arm.right{right:43px;animation:wave2 2.2s infinite}
@keyframes wave{0%,100%{transform:rotate(-23deg)}50%{transform:rotate(31deg)}}@keyframes wave2{0%,100%{transform:rotate(18deg)}50%{transform:rotate(-5deg)}}
.foot{position:absolute;top:335px;width:56px;height:35px;border:5px solid #262b3d;background:#eef2f7;border-radius:24px}.foot.left{left:99px}.foot.right{right:99px}
.bubble{width:100%;max-width:520px;background:white;border-radius:30px;padding:16px 18px;box-shadow:0 16px 42px #00000014;text-align:center;font-size:18px;line-height:1.35;font-weight:900;min-height:82px;display:flex;align-items:center;justify-content:center}
.controls{width:100%;max-width:520px;display:flex;flex-direction:column;align-items:center;gap:10px;padding-bottom:2px;z-index:1000}
.mic{width:128px;height:128px;border:0;border-radius:50%;font-size:56px;background:linear-gradient(180deg,#ff8fc7,#ff5ea8);color:white;box-shadow:0 18px 38px #ff5ea855;font-weight:1000;touch-action:manipulation;z-index:1001}
.mic.recording{animation:micPulse 1s infinite;background:linear-gradient(180deg,#ff477e,#e6005c)}
.mic.busy{background:linear-gradient(180deg,#aaa,#777)}
@keyframes micPulse{50%{transform:scale(1.08);box-shadow:0 0 0 14px #ff5ea833,0 18px 38px #ff5ea855}}
.hint{font-size:15px;font-weight:850;color:#5f6678;text-align:center}
@media(max-height:760px){.robotWrap{height:295px;transform:scale(.82);margin:-24px 0}.title{font-size:23px}.bubble{font-size:16px;min-height:72px}.mic{width:100px;height:100px;font-size:44px}}
</style>
</head>
<body>
<div class="app">
  <div class="badge">🛡️ Güvenli çocuk modu</div>
  <main class="stage">
    <div class="title">Merhaba Elif Sare!</div>
    <div class="subtitle">Mikrofona bas, konuş, tekrar bas.</div>
    <div class="robotWrap">
      <div id="robot" class="robot">
        <div class="antenna"></div><div class="light"></div><div class="ear left"></div><div class="ear right"></div>
        <div class="hair"></div><div class="bow">🎀</div>
        <div class="head">
          <div class="eye left"><div class="pupil"><div class="shine"></div></div></div>
          <div class="eye right"><div class="pupil"><div class="shine"></div></div></div>
          <div class="cheek left"></div><div class="cheek right"></div><div class="mouth"></div>
        </div>
        <div class="arm left"></div><div class="arm right"></div>
        <div class="body"><div class="screen">LİNA</div></div>
        <div class="foot left"></div><div class="foot right"></div>
      </div>
    </div>
    <div id="bubble" class="bubble">Konuşmak için pembe mikrofona bas.</div>
  </main>
  <section class="controls">
    <button id="micBtn" class="mic" type="button">🎙️</button>
    <div id="hint" class="hint">Basınca dinler, tekrar basınca cevap verir.</div>
  </section>
  <audio id="player" playsinline preload="auto"></audio>
</div>

<script>
const CHILD_NAME = "Elif Sare";
const robot = document.getElementById('robot');
const bubble = document.getElementById('bubble');
const micBtn = document.getElementById('micBtn');
const hint = document.getElementById('hint');
const player = document.getElementById('player');

let mediaRecorder = null;
let chunks = [];
let stream = null;
let isRecording = false;
let isBusy = false;
let history = [];
let audioCtx = null;

function setBubble(t){ bubble.textContent = t; }
function anim(on){ robot.classList.toggle('speaking', !!on); }

async function prepareAudio(){
  try{
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if(AudioContextClass && !audioCtx){
      audioCtx = new AudioContextClass();
    }
    if(audioCtx && audioCtx.state !== "running"){
      await audioCtx.resume();
    }
  }catch(e){}
}

async function playMp3WithWebAudio(blob){
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if(!AudioContextClass) throw new Error("AudioContext yok");

  if(!audioCtx) audioCtx = new AudioContextClass();
  if(audioCtx.state !== "running") await audioCtx.resume();

  const arr = await blob.arrayBuffer();
  const buffer = await audioCtx.decodeAudioData(arr.slice(0));
  const source = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  gain.gain.value = 1.0;
  source.buffer = buffer;
  source.connect(gain);
  gain.connect(audioCtx.destination);

  return new Promise((resolve, reject) => {
    source.onended = resolve;
    try { source.start(0); } catch(e) { reject(e); }
  });
}

async function speak(text){
  setBubble(text);
  anim(true);

  try{
    await prepareAudio();

    const r = await fetch('/api/tts', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ text })
    });

    if(!r.ok) throw new Error(await r.text());

    const blob = await r.blob();

    try{
      await playMp3WithWebAudio(blob);
      anim(false);
      return;
    }catch(e){
      const url = URL.createObjectURL(blob);
      player.pause();
      player.src = url;
      player.volume = 1;
      player.muted = false;
      player.playsInline = true;
      player.onended = () => { anim(false); URL.revokeObjectURL(url); };
      player.onerror = () => { anim(false); URL.revokeObjectURL(url); };
      await player.play();
      return;
    }
  }catch(e){
    anim(false);
    setBubble(text);
  }
}

async function chat(message){
  try{
    const r = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        childName: CHILD_NAME,
        message,
        history: history.slice(-8)
      })
    });

    if(!r.ok) throw new Error(await r.text());
    const d = await r.json();
    return d.reply || "Seni duydum Elif Sare. Buna birlikte bakalım mı?";
  }catch(e){
    return "Seni duydum Elif Sare. Buna birlikte bakalım mı?";
  }
}

async function handle(text){
  history.push({role:'user', content:text});
  setBubble('Duydum: ' + text);
  hint.textContent = 'Lina düşünüyor...';
  const reply = await chat(text);
  history.push({role:'assistant', content:reply});
  hint.textContent = 'Konuşmak için mikrofona bas.';
  await new Promise(resolve => setTimeout(resolve, 1500));
  await speak(reply);
}

async function startRecording(){
  if(isBusy || isRecording) return;
  await prepareAudio();

  try{
    stream = await navigator.mediaDevices.getUserMedia({audio:true});
    chunks = [];

    const mime = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' :
                 MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : '';

    mediaRecorder = new MediaRecorder(stream, mime ? {mimeType:mime} : undefined);
    mediaRecorder.ondataavailable = e => { if(e.data && e.data.size > 0) chunks.push(e.data); };
    mediaRecorder.onstop = uploadAudio;
    mediaRecorder.start();

    isRecording = true;
    micBtn.classList.add('recording');
    micBtn.textContent = '⏹️';
    setBubble('Dinliyorum Elif Sare... Bitince mikrofona tekrar bas.');
    hint.textContent = 'Şimdi konuşabilirsin.';
  }catch(e){
    setBubble('Mikrofon izni alınamadı. Safari ayarlarından mikrofon iznini açalım.');
  }
}

function stopRecording(){
  if(!isRecording) return;

  isBusy = true;
  micBtn.classList.add('busy');
  micBtn.disabled = true;

  try{ if(mediaRecorder) mediaRecorder.stop(); }catch(e){}
  try{ if(stream){ stream.getTracks().forEach(t=>t.stop()); stream = null; } }catch(e){}

  isRecording = false;
  micBtn.classList.remove('recording');
  micBtn.textContent = '⏳';
  setBubble('Seni anlamaya çalışıyorum...');
  hint.textContent = 'Bir saniye...';
}

async function uploadAudio(){
  try{
    const type = chunks[0]?.type || 'audio/mp4';
    const blob = new Blob(chunks, {type});
    const fd = new FormData();
    fd.append('audio', blob, type.includes('mp4') ? 'recording.mp4' : 'recording.webm');

    const r = await fetch('/api/transcribe', {method:'POST', body:fd});
    if(!r.ok) throw new Error(await r.text());

    const d = await r.json();
    const said = (d.text || '').trim();

    if(!said){
      setBubble('Seni tam anlayamadım Elif Sare. Bir daha söyler misin?');
    }else{
      await handle(said);
    }
  }catch(e){
    setBubble('Seni anlamakta zorlandım Elif Sare. Bir daha kısa söyleyelim mi?');
  }finally{
    isBusy = false;
    micBtn.disabled = false;
    micBtn.classList.remove('busy');
    micBtn.textContent = '🎙️';
    hint.textContent = 'Konuşmak için mikrofona bas.';
  }
}

micBtn.addEventListener('click', async () => {
  if(isBusy) return;
  await prepareAudio();
  if(isRecording) stopRecording();
  else startRecording();
});

setBubble('Merhaba Elif Sare! Konuşmak için pembe mikrofona bas.');
</script>
</body>
</html>
