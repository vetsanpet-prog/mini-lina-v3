<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#ff8fc7"/>
  <title>Lina Robot</title>
  <style>
    :root{--ink:#252b3d;--pink:#ff8fc7;--card:#ffffffde}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:var(--ink)}body{background:radial-gradient(circle at 15% 10%,#fff6b9 0 14%,transparent 30%),radial-gradient(circle at 85% 20%,#ffd7ec 0 16%,transparent 32%),linear-gradient(135deg,#fff9dd,#e8f8ff,#fff0f7)}.app{height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 14px)}.top{width:100%;display:flex;justify-content:center;padding-top:10px}.badge{background:#ecfff3;color:#10864b;border-radius:999px;padding:9px 13px;font-size:13px;font-weight:900;box-shadow:0 8px 20px #0001}.stage{width:100%;max-width:520px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;min-height:0;position:relative}.title{font-weight:1000;font-size:28px;margin:8px 0 4px;text-align:center}.subtitle{font-size:15px;color:#687083;font-weight:750;text-align:center;margin-bottom:4px}.robotWrap{height:360px;width:340px;position:relative;flex:0 0 auto}.robot{position:absolute;left:50%;top:26px;transform:translateX(-50%);width:338px;height:350px;animation:float 3.3s ease-in-out infinite;filter:drop-shadow(0 24px 20px #60708625)}@keyframes float{0%,100%{transform:translateX(-50%) translateY(0) rotate(-.4deg)}50%{transform:translateX(-50%) translateY(-11px) rotate(.5deg)}}.hair{position:absolute;left:50%;top:-2px;transform:translateX(-50%);width:220px;height:86px;border-radius:70px 70px 20px 20px;background:linear-gradient(135deg,#7c5cff,#ff91c6);border:5px solid #262b3d;z-index:1}.bow{position:absolute;left:50%;top:-35px;transform:translateX(-50%);font-size:54px;z-index:5;filter:drop-shadow(0 5px 3px #0002)}.antenna{position:absolute;left:50%;top:-39px;width:7px;height:33px;border-radius:8px;background:#262b3d;z-index:0}.light{position:absolute;left:50%;top:-61px;transform:translateX(-50%);width:28px;height:28px;background:#ffe45d;border:4px solid #262b3d;border-radius:50%;animation:lamp 1.4s infinite}@keyframes lamp{50%{box-shadow:0 0 30px #ffdd44;transform:translateX(-50%) scale(1.12)}}.ear{position:absolute;top:104px;width:51px;height:82px;border:5px solid #262b3d;background:linear-gradient(#ffd7ec,#ff99c9);border-radius:50px;z-index:1;animation:ear 2.6s ease-in-out infinite}.ear.left{left:22px}.ear.right{right:22px;animation-delay:.55s}@keyframes ear{50%{transform:rotate(8deg) translateY(-2px)}}.head{position:absolute;left:50%;top:22px;transform:translateX(-50%);width:235px;height:220px;border:5px solid #262b3d;border-radius:58px;background:linear-gradient(160deg,#effdff,#98e7ff 72%,#78d7ff);z-index:2;box-shadow:inset -16px -18px 0 #61c9ee55}.eye{position:absolute;top:92px;width:58px;height:61px;background:white;border-radius:50%;box-shadow:inset 0 5px 12px #0002}.eye.left{left:43px}.eye.right{right:43px}.pupil{position:absolute;left:15px;top:16px;width:28px;height:28px;border-radius:50%;background:#23283a;animation:blink 4.2s infinite}.shine{position:absolute;left:6px;top:5px;width:8px;height:8px;background:#fff;border-radius:50%}@keyframes blink{0%,43%,49%,100%{transform:scaleY(1)}46%{transform:scaleY(.06)}}.cheek{position:absolute;top:154px;width:36px;height:18px;background:#ff8fc799;border-radius:50%}.cheek.left{left:27px}.cheek.right{right:27px}.mouth{position:absolute;left:50%;top:158px;transform:translateX(-50%);width:56px;height:19px;border:5px solid #23283a;border-top:0;background:#ff72aa;border-radius:0 0 44px 44px}.speaking .mouth{animation:talk .42s infinite}@keyframes talk{0%,100%{width:46px;height:14px}35%{width:82px;height:36px}70%{width:56px;height:25px}}.body{position:absolute;left:50%;top:235px;transform:translateX(-50%);width:188px;height:112px;border:5px solid #262b3d;border-radius:40px;background:linear-gradient(150deg,#f5dbff,#ffc0e4);z-index:2;box-shadow:inset -14px -14px 0 #d985ff33}.screen{position:absolute;left:50%;top:28px;transform:translateX(-50%);background:#fff;border:3px solid #262b3d;border-radius:18px;padding:9px 16px;font-weight:1000;color:#9c3cc0}.arm{position:absolute;top:250px;width:42px;height:100px;border:5px solid #262b3d;background:linear-gradient(#b9f1ff,#77d8f7);border-radius:30px;transform-origin:top center;z-index:1}.arm.left{left:43px;animation:wave 1.25s ease-in-out infinite}.arm.right{right:43px;animation:wave2 2.2s ease-in-out infinite}@keyframes wave{0%,100%{transform:rotate(-23deg)}50%{transform:rotate(31deg)}}@keyframes wave2{0%,100%{transform:rotate(18deg)}50%{transform:rotate(-5deg)}}.foot{position:absolute;top:335px;width:56px;height:35px;border:5px solid #262b3d;background:#eef2f7;border-radius:24px}.foot.left{left:99px}.foot.right{right:99px}.bubble{width:100%;max-width:520px;background:white;border-radius:30px;padding:18px;box-shadow:0 16px 42px #00000014;text-align:center;font-size:20px;line-height:1.35;font-weight:900;min-height:86px;display:flex;align-items:center;justify-content:center}.controls{width:100%;max-width:520px;display:flex;flex-direction:column;align-items:center;gap:12px;padding-bottom:6px}.mic{width:118px;height:118px;border:0;border-radius:50%;font-size:52px;background:linear-gradient(180deg,#ff8fc7,#ff5ea8);color:white;box-shadow:0 18px 38px #ff5ea855;font-weight:1000}.mic.recording{animation:micPulse 1s infinite;background:linear-gradient(180deg,#ff477e,#e6005c)}@keyframes micPulse{50%{transform:scale(1.08);box-shadow:0 0 0 14px #ff5ea833,0 18px 38px #ff5ea855}}.hint{font-size:15px;font-weight:850;color:#5f6678;text-align:center}.smallBtns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}.smallBtns button{border:0;border-radius:999px;padding:10px 12px;font-weight:900;background:#fff;box-shadow:0 8px 18px #0001}@media(max-height:760px){.robotWrap{height:305px;transform:scale(.84);margin:-20px 0}.title{font-size:24px}.bubble{font-size:17px;min-height:74px}.mic{width:98px;height:98px;font-size:44px}}
  </style>
</head>
<body>
  <div class="app">
    <div class="top"><div class="badge">🛡️ Güvenli çocuk modu</div></div>
    <main class="stage">
      <div class="title">Merhaba, ben Lina!</div>
      <div class="subtitle">Mikrofona bas, konuş, tekrar bas.</div>
      <div class="robotWrap"><div id="robot" class="robot"><div class="antenna"></div><div class="light"></div><div class="ear left"></div><div class="ear right"></div><div class="hair"></div><div class="bow">🎀</div><div class="head"><div class="eye left"><div class="pupil"><div class="shine"></div></div></div><div class="eye right"><div class="pupil"><div class="shine"></div></div></div><div class="cheek left"></div><div class="cheek right"></div><div class="mouth"></div></div><div class="arm left"></div><div class="arm right"></div><div class="body"><div class="screen">LİNA</div></div><div class="foot left"></div><div class="foot right"></div></div></div>
      <div id="bubble" class="bubble">Merhaba minik arkadaşım! Konuşmak için pembe mikrofona bas.</div>
    </main>
    <section class="controls"><button id="micBtn" class="mic" onclick="toggleRecording()">🎙️</button><div id="hint" class="hint">Basınca dinler, tekrar basınca cevap verir.</div><div class="smallBtns"><button onclick="quick('Bana kısa bir masal anlat')">🌙 Masal</button><button onclick="quick('Bana bir bilmece sor')">🧩 Bilmece</button><button onclick="quick('İyi geceler hikayesi anlat')">😴 Uyku</button></div></section>
  </div>
<script>
const $=id=>document.getElementById(id);const robot=$('robot'),bubble=$('bubble'),micBtn=$('micBtn'),hint=$('hint');let mediaRecorder=null,chunks=[],stream=null,isRecording=false,history=[];function setBubble(s){bubble.textContent=s}function talkAnim(on){robot.classList.toggle('speaking',!!on)}async function apiChat(message){try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message,childName:'minik arkadaşım',points:0,history:history.slice(-8)})});if(!r.ok)throw new Error(await r.text());const data=await r.json();return data.reply||'Bunu oyun gibi düşünelim mi? Sana bir bilmece sorabilirim.'}catch(e){return localReply(message)}}function localReply(input){const l=input.toLocaleLowerCase('tr-TR');if(l.includes('masal'))return'Bir varmış bir yokmuş, minik bir yıldız gökyüzünde parlamayı unutmuş. Lina ona gülümsemiş ve yıldız yeniden ışıl ışıl olmuş.';if(l.includes('bilmece'))return'Bilmece: Sarıdır, gökyüzünde parlar, bizi ısıtır. Nedir?';if(l.includes('iyi geceler')||l.includes('uyku'))return'İyi geceler minik yıldız. Gözlerini kapat, ay dede sana gülümsesin. Tatlı rüyalar.';return'Çok güzel söyledin! Sana cevap vermeyi çok sevdim. Bir masal ister misin?'}async function speak(text){setBubble(text);talkAnim(true);try{const r=await fetch('/api/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});if(r.ok){const blob=await r.blob();const url=URL.createObjectURL(blob);const a=new Audio(url);a.onended=()=>talkAnim(false);a.onerror=()=>talkAnim(false);await a.play();return}}catch(e){}if('speechSynthesis'in window){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='tr-TR';u.rate=1.03;u.pitch=1.65;u.volume=.95;u.onend=()=>talkAnim(false);u.onerror=()=>talkAnim(false);speechSynthesis.speak(u)}else{setTimeout(()=>talkAnim(false),3000)}}async function handleMessage(text){history.push({role:'child',text});setBubble('Duydum: '+text);hint.textContent='Lina düşünüyor...';const reply=await apiChat(text);history.push({role:'lina',text:reply});hint.textContent='Konuşmak için mikrofona bas.';await speak(reply)}async function quick(text){await handleMessage(text)}async function toggleRecording(){if(isRecording){stopRecording();return}try{stream=await navigator.mediaDevices.getUserMedia({audio:true});chunks=[];const mime=MediaRecorder.isTypeSupported('audio/mp4')?'audio/mp4':MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'';mediaRecorder=new MediaRecorder(stream,mime?{mimeType:mime}:undefined);mediaRecorder.ondataavailable=e=>{if(e.data&&e.data.size>0)chunks.push(e.data)};mediaRecorder.onstop=uploadAudio;mediaRecorder.start();isRecording=true;micBtn.classList.add('recording');micBtn.textContent='⏹️';setBubble('Dinliyorum... Konuşman bitince mikrofona tekrar bas.');hint.textContent='Şimdi konuşabilirsin.'}catch(e){await speak('Mikrofon izni alınamadı. Safari ayarlarından mikrofon iznini açalım.')}}function stopRecording(){if(mediaRecorder&&isRecording)mediaRecorder.stop();if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}isRecording=false;micBtn.classList.remove('recording');micBtn.textContent='🎙️';setBubble('Seni anlamaya çalışıyorum...');hint.textContent='Bir saniye...'}async function uploadAudio(){try{const blob=new Blob(chunks,{type:chunks[0]?.type||'audio/mp4'});const fd=new FormData();fd.append('audio',blob,blob.type.includes('mp4')?'recording.mp4':'recording.webm');let r=await fetch('/api/transcribe',{method:'POST',body:fd});if(!r.ok)r=await fetch('/api/transkripsiyon',{method:'POST',body:fd});if(!r.ok)throw new Error(await r.text());const data=await r.json();const text=(data.text||'').trim();if(!text){await speak('Seni tam anlayamadım tatlım. Bir daha kısa söyleyelim mi?');hint.textContent='Konuşmak için mikrofona bas.';return}await handleMessage(text)}catch(e){console.warn(e);await speak('Sesi anlamakta zorlandım. Bir daha deneyelim mi?');hint.textContent='Konuşmak için mikrofona bas.'}}
setTimeout(()=>speak('Merhaba minik arkadaşım! Ben Lina. Konuşmak için pembe mikrofona bas.'),600);
</script>
</body>
</html>
